name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: E2e smoke test (installed binary)
        # Run commands against the installed `swe` entry point — NOT
        # PYTHONPATH=src.  This catches stale-install bugs where a new
        # module file exists in the source tree but is invisible to the
        # pip-installed binary (e.g. after switching from a non-editable
        # install).  Each command exercises a different subsystem:
        #   list      → harness registry + rate_limits + session cache
        #   aliases   → harness registry
        #   session   → session parsers + aggregator
        #   models    → models analytics
        #   skills    → skills discovery
        #   mcp list  → mcp formats + cli
        #   providers → providers registry + keys
        #   __complete → completion engine
        run: |
          swe --help
          swe tags
          swe list
          swe aliases
          swe session
          swe models
          swe skills
          swe mcp list
          swe providers list
          swe __complete list

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
